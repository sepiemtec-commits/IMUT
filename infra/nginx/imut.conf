upstream imut_api {
    server api:3000;
    keepalive 32;
}

# Produção: terminar TLS aqui e repassar X-Forwarded-Proto: https
# server { listen 443 ssl; ssl_certificate ...; include conf abaixo }

server {
    listen 80;
    server_name localhost;

    client_max_body_size 1m;

    location /health {
        proxy_pass http://imut_api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /webhooks/stripe {
        proxy_pass http://imut_api/webhooks/stripe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://imut_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
    }
}
